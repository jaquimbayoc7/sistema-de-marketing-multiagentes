  <rect x="44" y="310" width="142" height="24" rx="5" fill="#0d2137" stroke="#2a5f8f" stroke-width="1"/>
  <text x="54" y="326" fill="#90caf9" font-size="10">🗓️ Timeline</text>

  <rect x="44" y="342" width="142" height="24" rx="5" fill="#0d2137" stroke="#2a5f8f" stroke-width="1"/>
  <text x="54" y="358" fill="#90caf9" font-size="10">🔑 API Key Anthropic</text>

  <line x1="55" y1="380" x2="175" y2="380" stroke="#2a5f8f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="115" y="398" text-anchor="middle" fill="#78909c" font-size="9">Datos del remitente</text>

  <rect x="44" y="407" width="142" height="24" rx="5" fill="#0d2137" stroke="#2a5f8f" stroke-width="1"/>
