  <rect x="30" y="92" width="170" height="490" rx="12" fill="url(#inputGrad)" stroke="#4a9eff" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="92" width="170" height="36" rx="12" fill="#1e4976"/>
  <rect x="30" y="116" width="170" height="12" fill="#1e4976"/>
  <text x="115" y="116" text-anchor="middle" fill="#90caf9" font-size="12" font-weight="700">📋  INPUTS</text>
  <text x="115" y="135" text-anchor="middle" fill="#64b5f6" font-size="10">Streamlit UI</text>

